<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradient)" rx="12" ry="12"/>
  <!-- Decorative paw prints -->
  <circle cx="60" cy="60" r="8" fill="#ff6e9630" />
  <circle cx="85" cy="45" r="6" fill="#ff6e9630" />
  <circle cx="100" cy="65" r="6" fill="#ff6e9630" />
  <circle cx="75" cy="78" r="6" fill="#ff6e9630" />
  <!-- Main title text -->
  <text x="600" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="bold"
        text-anchor="middle" fill="#ffffff">RolfMoleman</text>
  <!-- Subtitle -->
  <text x="600" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="26"
