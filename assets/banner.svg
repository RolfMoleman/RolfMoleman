  <!-- Accent line -->
  <rect x="460" y="218" width="280" height="3" rx="2" fill="#ff6e96"/>
  <!-- Bottom tagline -->
  <text x="600" y="262" font-family="'Segoe UI', Arial, sans-serif" font-size="18"
