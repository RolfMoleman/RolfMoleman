<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6e96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#161b22"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#logoGradient)" stroke-width="4"/>
  <!-- Letter "M" styled as a mole hill -->
  <text x="100" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="100" font-weight="bold"
        text-anchor="middle" fill="url(#logoGradient)">M</text>
  <!-- Small paw print dot accent -->
  <circle cx="152" cy="58" r="7" fill="#ff6e96"/>
  <circle cx="164" cy="44" r="5" fill="#ff6e96"/>
  <circle cx="172" cy="60" r="5" fill="#ff6e96"/>
  <circle cx="156" cy="70" r="5" fill="#ff6e96"/>
</svg>
